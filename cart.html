<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart - Bundt Bakery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="images/Bundt_logo.jpg" alt="Bundt Bakery Logo" class="main-logo">
        </div>

        <nav>
            <a href="index.html">HOME</a>
            <a href="menu.html">MENU</a>
            <a href="contact.html">CONTACT</a>
            <a href="cart.html" class="order-now-btn">ORDER NOW</a>
        </nav>
    </header>

    <main>
        <section class="cart-section">

            <h1>Your Cart</h1>

            <p class="cart-intro">
                Review your selected bakery items before placing your order.
            </p>

            <div id="cart-items"></div>

            <div class="cart-total-box">
                <h3 id="cart-total">Total: 0 SAR</h3>

                <button class="checkout-btn" onclick="checkout()">
                    Checkout
                </button>

                <button class="clear-cart-btn" onclick="clearCart()">
                    Clear Cart
                </button>
            </div>

        </section>
    </main>

    <footer>
        <div class="footer-container">

            <div class="footer-info">
                <p><strong>Location:</strong> Dammam, Saudi Arabia</p>
                <p><strong>Working Hours:</strong> 8 AM - 10 PM</p>
                <p><strong>Email:</strong> customerservice@bundtbakery.com</p>
            </div>

            <div class="footer-bottom">
                <p>&copy; 2024-25 Bundt Bakery - BIS351 Project</p>
            </div>

        </div>
    </footer>

    <script src="js/script.js"></script>

</body>
</html>
